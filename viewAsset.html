<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>View Asset</title>

    <!-- ✅ LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #212529;
        }

        .wrap {
            max-width: 700px;
            margin: auto;
            padding: 15px;
        }

        .header {
            background: #2c7be5;
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
        }

        .title h1 {
            margin: 0;
            font-size: 18px;
        }

        .title .sub {
            font-size: 12px;
            opacity: 0.85;
        }

        .pill {
            margin-top: 8px;
            display: inline-block;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
        }

        .panel {
            margin-top: 15px;
        }

        .seg {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .seg button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #dee2e6;
            font-weight: bold;
            cursor: pointer;
        }

        .seg button.active {
            background: #2c7be5;
            color: white;
        }

        .form {
            display: grid;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .row>div {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .row input {
            margin-top: 4px;
        }

        label {
            font-size: 13px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #2c7be5;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            background: #0d6efd;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #0b5ed7;
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .btn2 {
            flex: 1;
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn2:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            display: block;
            line-height: 1.45;
            white-space: pre-line;
        }

        .status.ok {
            background: #e7f7ee;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .status.err {
            background: #fdecec;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .status.warn {
            background: #fff4e0;
            color: #7a4d00;
            border: 1px solid #ffe0a3;
        }

        .results {
            margin-top: 15px;
        }

        .meta {
            padding: 10px;
            border-radius: 10px;
            background: white;
            border: 1px dashed #ced4da;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cards {
            display: grid;
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.1);
        }

        .img {
            width: 100%;
            height: 180px;
            background: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tag {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 999px;
        }

        .body {
            margin-top: 10px;
        }

        .head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }

        .left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .assetno {
            font-weight: bold;
            font-size: 15px;
            word-break: break-word;
        }

        .atype {
            font-size: 12px;
            color: #6c757d;
        }

        .chip {
            background: #e9ecef;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            height: fit-content;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .kv {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
        }

        .k {
            font-size: 11px;
            color: #6c757d;
        }

        .v {
            font-size: 13px;
            margin-top: 4px;
            word-break: break-word;
        }

        .foot {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .link {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: #0d6efd;
            color: white;
            text-decoration: none;
            font-size: 13px;
        }

        .copy {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: #6c757d;
            color: white;
            border: none;
            cursor: pointer;
        }

        .small {
            font-size: 12px;
            color: #6c757d;
        }

        .hint {
            font-size: 13px;
            color: #495057;
            background: #ffffff;
            border: 1px dashed #ced4da;
            border-radius: 10px;
            padding: 10px;
        }

        .mono {
            font-family: Consolas, Monaco, 'Courier New', monospace;
        }

        @media (max-width: 480px) {
            .row {
                flex-direction: column;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .foot {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <div class="title">
                <h1>View Asset</h1>
                <div class="sub">ค้นหาและดูข้อมูลสินทรัพย์แบบรายการ</div>
            </div>
            <div class="pill" id="envPill">Ready</div>
        </div>

        <div class="panel">
            <div class="seg" role="tablist" aria-label="Search Mode">
                <button id="tabMy" class="active" type="button">👤 Asset ของฉัน</button>
                <button id="tabOther" type="button">🔎 Asset ของคนอื่น</button>
            </div>

            <!-- MY ASSET -->
            <div class="form" id="myForm">
                <!-- <div class="hint">
                    โหมดนี้ระบบจะใช้ <b>LINE User ID</b> ของผู้ใช้งานปัจจุบัน
                    ไปค้นหาในฟิลด์ <b>Asset_ID</b> ที่เก็บ LINE ID ไว้
                </div> -->

                <div class="row">
                    <div>
                        <label>LINE User ID</label>
                        <input id="myLineId" placeholder="กำลังโหลดจาก LINE..." readonly />
                    </div>
                </div>

                <div class="actions">
                    <button class="btn" id="btnSearchMy" type="button">ค้นหา Asset ของฉัน</button>
                    <button class="btn2" id="btnClear" type="button">ล้างผลลัพธ์</button>
                </div>

                <div class="status" id="statusBox">พร้อมค้นหา</div>
            </div>

            <!-- OTHER ASSET -->
            <div class="form" id="otherForm" style="display:none">
                <div class="hint">
                    โหมดนี้ให้กรอก <b>Emp_Code</b> หรือ <b>Asset_No</b> อย่างใดอย่างหนึ่งเพื่อค้นหา
                </div>

                <div class="row">
                    <div>
                        <label>Emp_Code</label>
                        <input id="otherEmp" placeholder="เช่น 104xxx" inputmode="numeric" />
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Asset_No</label>
                        <input id="otherAssetNo" placeholder="เช่น 20100001xxxx" inputmode="numeric" />
                    </div>
                </div>

                <div class="actions">
                    <button class="btn" id="btnSearchOther" type="button">ค้นหา</button>
                    <button class="btn2" id="btnClear2" type="button">ล้าง</button>
                </div>

                <div class="status" id="statusBox2">พร้อมค้นหา</div>
            </div>
        </div>

        <div class="results" id="results" style="display:none">
            <div class="meta">
                <div id="resultCount">ผลลัพธ์: 0</div>
                <div class="small" id="lastQuery">—</div>
            </div>
            <div class="cards" id="cards"></div>
        </div>
    </div>

    <script>
        /** ==========================
         *  CONFIG
         *  ========================== */
        const FLOW_URL = "https://defaultd9cd485e39bd4cc995398c97631fbb.71.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4acd54dcfb9b4cb7a2c9370ee0a0746e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tvQw4oo26AYM9qr8U_5xoVdGz3fX5Gar8YpOFN_L8mM";

        // ✅ ใส่ LIFF ID ของจริง
        const LIFF_ID = "2010143473-DPdFN5rP";

        const $ = (id) => document.getElementById(id);
        const envPill = $("envPill");

        // LINE state
        let lineUserId = "";
        let lineDisplayName = "";
        let liffInitialized = false;

        function setPill(text, tone = "ready") {
            envPill.textContent = text;

            if (tone === "err") {
                envPill.style.background = "rgba(220,53,69,.20)";
                envPill.style.color = "#fff";
            } else if (tone === "warn") {
                envPill.style.background = "rgba(255,193,7,.25)";
                envPill.style.color = "#fff";
            } else {
                envPill.style.background = "rgba(255,255,255,.30)";
                envPill.style.color = "#fff";
            }
        }

        function setStatus(box, text, tone = "") {
            box.className = "status" + (tone ? " " + tone : "");
            box.textContent = text;
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, (m) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
            }[m]));
        }

        function normalizeDigits(s) {
            return String(s ?? "").trim();
        }

        function showResults(show) {
            $("results").style.display = show ? "grid" : "none";
        }

        function clearResults() {
            $("cards").innerHTML = "";
            $("resultCount").textContent = "ผลลัพธ์: 0";
            $("lastQuery").textContent = "—";
            showResults(false);
        }

        function buildCard(item) {
            const photo = item.PhotoUrl || item.PhotoURL || item.photoUrl || "";
            const asstNo = item.Asst_No || item.AsstNo || item.Asset_No || item.AssetNo || "";
            const assetType = item.Asset_Type || item.AssetType || "-";
            const manu = item.Manufacturer || "-";
            const model = item.Model || "-";
            const plant = item.Plant || "-";
            const dept = item.Department || "-";
            const area = item.Area || "-";
            const empCode = item.Emp_Code || item.EmpCode || "-";
            const empName = item.Emp_Name || item.EmpName || "-";

            const safePhoto = escapeHtml(photo);
            const safeAsst = escapeHtml(asstNo);

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <div class="img">
                    ${photo
                    ? `<img src="${safePhoto}" alt="Asset Photo" loading="lazy" />`
                    : `<div style="color:#6c757d;font-size:13px">ไม่มีรูป</div>`}
                    <div class="tag">${escapeHtml(plant)} • ${escapeHtml(area)}</div>
                </div>

                <div class="body">
                    <div class="head">
                        <div class="left">
                            <div class="assetno">${safeAsst || "-"}</div>
                            <div class="atype">${escapeHtml(assetType)}</div>
                        </div>
                        <div class="chip">${escapeHtml(manu)}</div>
                    </div>

                    <div class="grid">
                        <div class="kv">
                            <div class="k">Model</div>
                            <div class="v">${escapeHtml(model)}</div>
                        </div>
                        <div class="kv">
                            <div class="k">Department</div>
                            <div class="v">${escapeHtml(dept)}</div>
                        </div>
                        <div class="kv">
                            <div class="k">Emp_Code</div>
                            <div class="v mono">${escapeHtml(empCode)}</div>
                        </div>
                        <div class="kv">
                            <div class="k">Emp_Name</div>
                            <div class="v">${escapeHtml(empName)}</div>
                        </div>
                    </div>
                </div>

                <div class="foot">
                    <a class="link" href="${safePhoto || "#"}" target="_blank" rel="noopener" ${photo ? "" : "aria-disabled='true' onclick='return false;'"}>🖼️ เปิดรูป</a>
                    <button class="copy" type="button">📋 Copy Asset_No</button>
                </div>
            `;

            card.querySelector(".copy").addEventListener("click", async () => {
                const txt = asstNo || "";
                try {
                    await navigator.clipboard.writeText(txt);
                    setPill("Copied ✓", "ready");
                    setTimeout(() => setPill("Ready", "ready"), 1200);
                } catch (e) {
                    const ta = document.createElement("textarea");
                    ta.value = txt;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    ta.remove();
                    setPill("Copied ✓", "ready");
                    setTimeout(() => setPill("Ready", "ready"), 1200);
                }
            });

            return card;
        }

        async function initLiff() {
            if (!window.liff) {
                setStatus($("statusBox"), "ไม่พบ LIFF SDK", "err");
                setPill("No LIFF", "err");
                return false;
            }

            if (!LIFF_ID || LIFF_ID === "PUT_YOUR_LIFF_ID_HERE") {
                setStatus($("statusBox"), "กรุณาใส่ LIFF_ID ก่อนใช้งาน", "err");
                setPill("No LIFF_ID", "err");
                return false;
            }

            try {
                setPill("Initializing LINE...", "warn");
                setStatus($("statusBox"), "กำลังเชื่อมต่อ LINE...", "");

                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return false;
                }

                const profile = await liff.getProfile();
                lineUserId = profile?.userId || "";
                lineDisplayName = profile?.displayName || "";
                liffInitialized = true;

                $("myLineId").value = lineUserId || "";

                if (!lineUserId) {
                    setStatus($("statusBox"), "ไม่สามารถอ่าน LINE User ID ได้", "err");
                    setPill("LINE Error", "err");
                    return false;
                }

                setStatus($("statusBox"), `พร้อมค้นหา\nผู้ใช้ LINE: ${lineDisplayName || "-"}`, "ok");
                setPill("LINE Ready", "ready");
                return true;

            } catch (err) {
                setStatus($("statusBox"), "เชื่อมต่อ LINE ไม่สำเร็จ: " + (err?.message || String(err)), "err");
                setPill("LINE Error", "err");
                return false;
            }
        }

        async function callFlow(payload) {
            if (!FLOW_URL || FLOW_URL.includes("PASTE_YOUR")) {
                throw new Error("กรุณาใส่ FLOW_URL (Power Automate HTTP Trigger) ก่อนใช้งาน");
            }

            const res = await fetch(FLOW_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const t = await res.text().catch(() => "");
                throw new Error(`เรียก Flow ไม่สำเร็จ (HTTP ${res.status}) ${t ? "- " + t : ""}`);
            }

            const ct = res.headers.get("content-type") || "";
            if (ct.includes("application/json")) {
                return await res.json();
            } else {
                const txt = await res.text();
                try {
                    return JSON.parse(txt);
                } catch {
                    return { ok: false, items: [], message: txt };
                }
            }
        }

        async function runSearch(mode) {
            const status = (mode === "my") ? $("statusBox") : $("statusBox2");
            const btn = (mode === "my") ? $("btnSearchMy") : $("btnSearchOther");
            btn.disabled = true;

            try {
                setStatus(status, "กำลังค้นหา... กรุณารอสักครู่", "");
                setPill("Searching…", "warn");

                let payload = { mode };

                if (mode === "my") {
                    if (!liffInitialized || !lineUserId) {
                        setStatus(status, "ยังไม่ได้รับ LINE User ID กรุณาเปิดผ่าน LINE OA / LIFF", "warn");
                        setPill("Need LINE", "warn");
                        return;
                    }

                    // ✅ ส่ง Line ID ไปหาใน Asset_ID
                    payload.Asset_ID = lineUserId;
                    payload.LineUserId = lineUserId;
                    payload.SearchField = "Asset_ID";
                    payload.FromLINE = true;
                } else {
                    const emp = normalizeDigits($("otherEmp").value);
                    const asst = normalizeDigits($("otherAssetNo").value);

                    if (!emp && !asst) {
                        setStatus(status, "กรุณากรอก Emp_Code หรือ Asset_No อย่างใดอย่างหนึ่ง", "warn");
                        setPill("Need input", "warn");
                        return;
                    }

                    if (emp) payload.Emp_Code = emp;
                    if (asst) payload.Asset_No = asst;
                }

                const data = await callFlow(payload);

                const items = (data && (data.items || data.Items || data.value)) || [];
                const ok = (data && (data.ok === true || data.ok === "true")) || Array.isArray(items);

                if (!ok) {
                    const msg = (data && (data.message || data.error)) || "ไม่พบข้อมูล/ตอบกลับไม่ถูกต้อง";
                    setStatus(status, msg, "err");
                    setPill("Error", "err");
                    clearResults();
                    return;
                }

                $("cards").innerHTML = "";
                items.forEach(it => $("cards").appendChild(buildCard(it)));

                $("resultCount").textContent = `ผลลัพธ์: ${items.length}`;
                $("lastQuery").textContent = (mode === "my")
                    ? `mode=my, Asset_ID=${lineUserId}`
                    : `mode=other, ${payload.Emp_Code ? "Emp_Code=" + payload.Emp_Code : ""}${payload.Emp_Code && payload.Asset_No ? ", " : ""}${payload.Asset_No ? "Asset_No=" + payload.Asset_No : ""}`;

                showResults(true);

                if (items.length === 0) {
                    setStatus(status, "ไม่พบรายการ (0 รายการ)", "warn");
                    setPill("No results", "warn");
                } else {
                    setStatus(status, "ค้นหาสำเร็จ ✓", "ok");
                    setPill("Done", "ready");
                    setTimeout(() => setPill("Ready", "ready"), 1200);
                }

            } catch (err) {
                setStatus(status, err.message || String(err), "err");
                setPill("Error", "err");
                clearResults();
            } finally {
                btn.disabled = false;
            }
        }

        /** ==========================
         *  UI Events
         *  ========================== */
        $("tabMy").addEventListener("click", () => {
            $("tabMy").classList.add("active");
            $("tabOther").classList.remove("active");
            $("myForm").style.display = "grid";
            $("otherForm").style.display = "none";
        });

        $("tabOther").addEventListener("click", () => {
            $("tabOther").classList.add("active");
            $("tabMy").classList.remove("active");
            $("myForm").style.display = "none";
            $("otherForm").style.display = "grid";
        });

        $("btnSearchMy").addEventListener("click", () => runSearch("my"));
        $("btnSearchOther").addEventListener("click", () => runSearch("other"));

        $("btnClear").addEventListener("click", () => {
            clearResults();
            setStatus($("statusBox"), "พร้อมค้นหา", "");
            setPill("Ready", "ready");
        });

        $("btnClear2").addEventListener("click", () => {
            $("otherEmp").value = "";
            $("otherAssetNo").value = "";
            clearResults();
            setStatus($("statusBox2"), "พร้อมค้นหา", "");
            setPill("Ready", "ready");
        });

        ["otherEmp", "otherAssetNo"].forEach(id => {
            $(id).addEventListener("keydown", (e) => {
                if (e.key === "Enter") runSearch("other");
            });
        });

        /** ==========================
         *  Querystring support
         *  ตัวอย่าง:
         *  - ?mode=my
         *  - ?mode=other&emp=104127
         *  - ?mode=other&asset=201000019802
         *  ========================== */
        function initFromQuery() {
            const q = new URLSearchParams(location.search);
            const mode = (q.get("mode") || "").toLowerCase();
            const emp = q.get("emp") || "";
            const asset = q.get("asset") || "";

            if (mode === "other") {
                $("tabOther").click();
                if (emp) $("otherEmp").value = emp;
                if (asset) $("otherAssetNo").value = asset;
                if (emp || asset) runSearch("other");
            } else if (mode === "my") {
                $("tabMy").click();
                runSearch("my");
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            await initLiff();
            initFromQuery();
        });
    </script>
</body>

</html>
