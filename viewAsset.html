<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>View Asset</title>
    <style>
        :root {

            --bg: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;


            /* --bg: #0b1220; */
            --card: #111a2e;
            --card2: #0f172a;
            /* --text: #e6edf7; */
            /* --muted: #9fb0c7; */
            /* --line: rgba(255, 255, 255, .08); */

            --accent: #4da3ff;
            --ok: #22c55e;
            --warn: #f59e0b;
            --err: #ef4444;
            --shadow: 0 10px 28px rgba(0, 0, 0, .35);
            --radius: 16px;
            --radius2: 12px;
            --gap: 12px;
            --max: 760px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans Thai", "Noto Sans", sans-serif;
        }

        * {
            box-sizing: border-box
        }

        /* body {
            margin: 0;
            font-family: var(--sans);
            background: radial-gradient(1200px 700px at 10% 0%, rgba(77, 163, 255, .18), transparent 55%),
                radial-gradient(900px 650px at 90% 10%, rgba(34, 197, 94, .10), transparent 60%),
                var(--bg);
            color: var(--text);
        } */

        body {
            margin: 0;
            font-family: var(--sans);
            background: #ffffff;
            color: var(--text);
        }

        .wrap {
            max-width: var(--max);
            margin: 0 auto;
            padding: 16px 14px 40px
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 14px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .title h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: .2px
        }

        .title .sub {
            font-size: 12px;
            color: var(--muted)
        }

        .pill {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            color: var(--muted);
            white-space: nowrap;
        }

        /* .panel {
            margin-top: 14px;
            padding: 14px;
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .03));
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        } */

        .panel {
            background: #ffffff;
            border: 1px solid var(--line);
        }


        .seg {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, .2);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px;
            overflow: auto;
        }

        .seg button {
            flex: 1;
            min-width: 140px;
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 10px 12px;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: .2px;
        }

        .seg button.active {
            background: rgba(77, 163, 255, .20);
            color: var(--text);
            outline: 1px solid rgba(77, 163, 255, .35)
        }

        .form {
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px
        }

        @media(min-width:520px) {
            .row {
                grid-template-columns: 1fr 1fr
            }
        }

        label {
            font-size: 12px;
            color: var(--muted)
        }

        input {
            width: 100%;
            padding: 12px 12px;
            border-radius: 12px;
            border: 1px solid var(--line);

            background: #ffffff;
            color: #111;

            /* background: rgba(0, 0, 0, .18); */
            /* color: var(--text); */
            outline: none;
        }

        input::placeholder {
            color: rgba(159, 176, 199, .6)
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 6px
        }

        .btn {
            border: 0;
            border-radius: 14px;
            padding: 12px 14px;
            font-weight: 700;
            color: #06101f;
            background: var(--accent);
            box-shadow: 0 10px 20px rgba(77, 163, 255, .25);
            flex: 1;
        }

        .btn:disabled {
            opacity: .55;
            filter: saturate(.6);
            box-shadow: none
        }

        .btn2 {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 14px;
            font-weight: 700;
            color: var(--text);
            background: rgba(255, 255, 255, .06);
            flex: 0 0 auto;
        }

        .status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px dashed var(--line);
            background: rgba(0, 0, 0, .18);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
        }

        .status.ok {
            border-color: rgba(34, 197, 94, .35);
            color: #baf3ce
        }

        .status.err {
            border-color: rgba(239, 68, 68, .45);
            color: #ffd1d1
        }

        .status.warn {
            border-color: rgba(245, 158, 11, .45);
            color: #ffe6b5
        }

        .results {
            margin-top: 14px;
            display: grid;
            gap: 12px
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            font-size: 13px;
            color: var(--muted);
        }

        .cards {
            display: grid;
            gap: 12px
        }

        .card {
            border: 1px solid var(--line);

            /* background: linear-gradient(180deg, rgba(17, 26, 46, .92), rgba(15, 23, 42, .92)); */
            background: #ffffff;

            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .img {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, .25);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block
        }

        .img .tag {
            position: absolute;
            left: 10px;
            bottom: 10px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(0, 0, 0, .55);
            border: 1px solid rgba(255, 255, 255, .12);
            font-size: 12px;
            color: #fff;
        }

        .body {
            padding: 12px 12px 10px
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .head .left {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .assetno {
            font-family: var(--mono);
            font-weight: 800;
            font-size: 15px;
            letter-spacing: .4px
        }

        .atype {
            font-size: 12px;
            color: var(--muted)
        }

        .chip {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        @media(min-width:520px) {
            .grid {
                grid-template-columns: 1fr 1fr
            }
        }

        .kv {
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(0, 0, 0, .14);
            min-height: 54px;
        }

        .k {
            font-size: 11px;
            color: var(--muted)
        }

        .v {
            margin-top: 4px;
            font-size: 13px;
            color: var(--text);
            word-break: break-word
        }

        .foot {
            display: flex;
            gap: 10px;
            padding: 10px 12px 12px;
            border-top: 1px solid var(--line);
            background: rgba(0, 0, 0, .12);
        }

        .link {
            flex: 1;
            text-decoration: none;
            text-align: center;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(77, 163, 255, .35);
            background: rgba(77, 163, 255, .12);
            color: var(--text);
            font-weight: 700;
            font-size: 13px;
        }

        .copy {
            flex: 0 0 auto;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-weight: 700;
            font-size: 13px;
        }

        .small {
            font-size: 12px;
            color: var(--muted)
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <div class="title">
                <h1>View Asset</h1>
                <div class="sub">ค้นหาและดูข้อมูลสินทรัพย์แบบรายการ</div>
            </div>
            <div class="pill" id="envPill">Ready</div>
        </div>

        <div class="panel">
            <div class="seg" role="tablist" aria-label="Search Mode">
                <button id="tabMy" class="active" type="button">👤 Asset ของฉัน</button>
                <button id="tabOther" type="button">🔎 Asset ของคนอื่น</button>
            </div>

            <div class="form" id="myForm">
                <!-- <div class="hint">
                    โหมดนี้ระบบจะส่งค่า <span style="font-family:var(--mono);color:#fff">Emp_Code="104127"</span> ไปให้
                    Power Automate เพื่อค้นหา Asset ของคุณ
                </div> -->
                <div class="row">
                    <div>
                        <label>Emp_Code (Fixed)</label>
                        <input id="myEmp" value="104127" readonly />
                    </div>
                    <div>
                        <label>หมายเหตุ</label>
                        <input value="ค้นหาจาก Emp_Code เท่านั้น" readonly />
                    </div>
                </div>

                <div class="actions">
                    <button class="btn" id="btnSearchMy" type="button">ค้นหา Asset ของฉัน</button>
                    <button class="btn2" id="btnClear" type="button">ล้างผลลัพธ์</button>
                </div>

                <div class="status" id="statusBox">พร้อมค้นหา</div>
            </div>

            <div class="form" id="otherForm" style="display:none">
                <div class="hint">
                    โหมดนี้ให้กรอก <b>Emp_Code</b> หรือ <b>Asset_No</b> อย่างใดอย่างหนึ่งเพื่อค้นหา
                </div>

                <div class="row">
                    <div>
                        <label>Emp_Code</label>
                        <input id="otherEmp" placeholder="เช่น 104127" inputmode="numeric" />
                    </div>
                    <div>
                        <label>Asset_No</label>
                        <input id="otherAssetNo" placeholder="เช่น 201000019802" inputmode="numeric" />
                    </div>
                </div>

                <div class="actions">
                    <button class="btn" id="btnSearchOther" type="button">ค้นหา</button>
                    <button class="btn2" id="btnClear2" type="button">ล้าง</button>
                </div>

                <div class="status" id="statusBox2">พร้อมค้นหา</div>
            </div>
        </div>

        <div class="results" id="results" style="display:none">
            <div class="meta">
                <div id="resultCount">ผลลัพธ์: 0</div>
                <div class="small" id="lastQuery">—</div>
            </div>
            <div class="cards" id="cards"></div>
        </div>
    </div>

    <script>
        /** ==========================
         *  CONFIG
         *  ========================== */
        const FLOW_URL = "https://defaultd9cd485e39bd4cc995398c97631fbb.71.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4acd54dcfb9b4cb7a2c9370ee0a0746e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tvQw4oo26AYM9qr8U_5xoVdGz3fX5Gar8YpOFN_L8mM";

        /** Expected Flow response (แนะนำ)
         *  {
         *    "ok": true,
         *    "items": [
         *      {
         *        "Asset_Type": "Desktop(PC)",
         *        "Manufacturer": "Dell",
         *        "Model": "...",
         *        "Asst_No": "201000019802",
         *        "Plant": "Gateway1",
         *        "Department": "AEG1",
         *        "Area": "Office A1",
         *        "Emp_Code": "104127",
         *        "Emp_Name": "....",
         *        "PhotoUrl": "https://....jpg"
         *      }
         *    ],
         *    "message": "optional"
         *  }
         */

        const $ = (id) => document.getElementById(id);
        const envPill = $("envPill");

        function setPill(text, tone = "ready") {
            envPill.textContent = text;
            envPill.style.borderColor = (tone === "err") ? "rgba(239,68,68,.45)"
                : (tone === "warn") ? "rgba(245,158,11,.45)"
                    : "rgba(255,255,255,.10)";
            envPill.style.color = (tone === "err") ? "#ffd1d1"
                : (tone === "warn") ? "#ffe6b5"
                    : "#9fb0c7";
        }

        function setStatus(box, text, tone = "") {
            box.className = "status" + (tone ? " " + tone : "");
            box.textContent = text;
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, (m) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
            }[m]));
        }

        function normalizeDigits(s) {
            return String(s ?? "").trim();
        }

        function showResults(show) {
            $("results").style.display = show ? "grid" : "none";
        }

        function clearResults() {
            $("cards").innerHTML = "";
            $("resultCount").textContent = "ผลลัพธ์: 0";
            $("lastQuery").textContent = "—";
            showResults(false);
        }

        function buildCard(item) {
            const photo = item.PhotoUrl || item.PhotoURL || item.photoUrl || "";
            const asstNo = item.Asst_No || item.AsstNo || item.Asset_No || item.AssetNo || "";
            const assetType = item.Asset_Type || item.AssetType || "-";
            const manu = item.Manufacturer || "-";
            const model = item.Model || "-";
            const plant = item.Plant || "-";
            const dept = item.Department || "-";
            const area = item.Area || "-";
            const empCode = item.Emp_Code || item.EmpCode || "-";
            const empName = item.Emp_Name || item.EmpName || "-";

            const safePhoto = escapeHtml(photo);
            const safeAsst = escapeHtml(asstNo);

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
    <div class="img">
      ${photo ? `<img src="${safePhoto}" alt="Asset Photo" loading="lazy" />`
                    : `<div style="color:rgba(159,176,199,.8);font-size:13px">ไม่มีรูป</div>`}
      <div class="tag">${escapeHtml(plant)} • ${escapeHtml(area)}</div>
    </div>

    <div class="body">
      <div class="head">
        <div class="left">
          <div class="assetno">${safeAsst || "-"}</div>
          <div class="atype">${escapeHtml(assetType)}</div>
        </div>
        <div class="chip">${escapeHtml(manu)}</div>
      </div>

      <div class="grid">
        <div class="kv">
          <div class="k">Model</div>
          <div class="v">${escapeHtml(model)}</div>
        </div>
        <div class="kv">
          <div class="k">Department</div>
          <div class="v">${escapeHtml(dept)}</div>
        </div>
        <div class="kv">
          <div class="k">Emp_Code</div>
          <div class="v" style="font-family:var(--mono)">${escapeHtml(empCode)}</div>
        </div>
        <div class="kv">
          <div class="k">Emp_Name</div>
          <div class="v">${escapeHtml(empName)}</div>
        </div>
      </div>
    </div>

    <div class="foot">
      <a class="link" href="${safePhoto || "#"}" target="_blank" rel="noopener" ${photo ? "" : "aria-disabled='true' onclick='return false;'"}>
        🖼️ เปิดรูป
      </a>
      <button class="copy" type="button">📋 Copy Asset_No</button>
    </div>
  `;

            card.querySelector(".copy").addEventListener("click", async () => {
                const txt = asstNo || "";
                try {
                    await navigator.clipboard.writeText(txt);
                    setPill("Copied ✓", "ready");
                    setTimeout(() => setPill("Ready", "ready"), 1200);
                } catch (e) {
                    // fallback
                    const ta = document.createElement("textarea");
                    ta.value = txt; document.body.appendChild(ta);
                    ta.select(); document.execCommand("copy"); ta.remove();
                    setPill("Copied ✓", "ready");
                    setTimeout(() => setPill("Ready", "ready"), 1200);
                }
            });

            return card;
        }

        async function callFlow(payload) {
            if (!FLOW_URL || FLOW_URL.includes("PASTE_YOUR")) {
                throw new Error("กรุณาใส่ FLOW_URL (Power Automate HTTP Trigger) ก่อนใช้งาน");
            }

            const res = await fetch(FLOW_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // ถ้า flow ส่ง error status
            if (!res.ok) {
                const t = await res.text().catch(() => "");
                throw new Error(`เรียก Flow ไม่สำเร็จ (HTTP ${res.status}) ${t ? "- " + t : ""}`);
            }

            // รองรับทั้ง JSON และ text (เผื่อ flow ตอบไม่ใช่ json)
            const ct = res.headers.get("content-type") || "";
            if (ct.includes("application/json")) {
                return await res.json();
            } else {
                const txt = await res.text();
                try { return JSON.parse(txt); } catch { return { ok: false, items: [], message: txt }; }
            }
        }

        async function runSearch(mode) {
            const status = (mode === "my") ? $("statusBox") : $("statusBox2");
            const btn = (mode === "my") ? $("btnSearchMy") : $("btnSearchOther");
            btn.disabled = true;

            try {
                setStatus(status, "กำลังค้นหา... กรุณารอสักครู่", "");
                setPill("Searching…", "warn");

                let payload = { mode };

                if (mode === "my") {
                    payload.Emp_Code = "104127";
                } else {
                    const emp = normalizeDigits($("otherEmp").value);
                    const asst = normalizeDigits($("otherAssetNo").value);

                    if (!emp && !asst) {
                        setStatus(status, "กรุณากรอก Emp_Code หรือ Asset_No อย่างใดอย่างหนึ่ง", "warn");
                        setPill("Need input", "warn");
                        return;
                    }
                    if (emp) payload.Emp_Code = emp;
                    if (asst) payload.Asset_No = asst;
                }

                const data = await callFlow(payload);

                const items = (data && (data.items || data.Items || data.value)) || [];
                const ok = (data && (data.ok === true || data.ok === "true")) || Array.isArray(items);

                if (!ok) {
                    const msg = (data && (data.message || data.error)) || "ไม่พบข้อมูล/ตอบกลับไม่ถูกต้อง";
                    setStatus(status, msg, "err");
                    setPill("Error", "err");
                    clearResults();
                    return;
                }

                // render
                $("cards").innerHTML = "";
                items.forEach(it => $("cards").appendChild(buildCard(it)));

                $("resultCount").textContent = `ผลลัพธ์: ${items.length}`;
                $("lastQuery").textContent = (mode === "my")
                    ? `mode=my, Emp_Code=104127`
                    : `mode=other, ${payload.Emp_Code ? "Emp_Code=" + payload.Emp_Code : ""}${payload.Emp_Code && payload.Asset_No ? ", " : ""}${payload.Asset_No ? "Asset_No=" + payload.Asset_No : ""}`;

                showResults(true);

                if (items.length === 0) {
                    setStatus(status, "ไม่พบรายการ (0 รายการ)", "warn");
                    setPill("No results", "warn");
                } else {
                    setStatus(status, "ค้นหาสำเร็จ ✓", "ok");
                    setPill("Done", "ready");
                    setTimeout(() => setPill("Ready", "ready"), 1200);
                }
            } catch (err) {
                setStatus(status, err.message || String(err), "err");
                setPill("Error", "err");
                clearResults();
            } finally {
                btn.disabled = false;
            }
        }

        /** ==========================
         *  UI Events
         *  ========================== */
        $("tabMy").addEventListener("click", () => {
            $("tabMy").classList.add("active");
            $("tabOther").classList.remove("active");
            $("myForm").style.display = "grid";
            $("otherForm").style.display = "none";
        });
        $("tabOther").addEventListener("click", () => {
            $("tabOther").classList.add("active");
            $("tabMy").classList.remove("active");
            $("myForm").style.display = "none";
            $("otherForm").style.display = "grid";
        });

        $("btnSearchMy").addEventListener("click", () => runSearch("my"));
        $("btnSearchOther").addEventListener("click", () => runSearch("other"));

        $("btnClear").addEventListener("click", () => {
            clearResults();
            setStatus($("statusBox"), "พร้อมค้นหา", "");
            setPill("Ready", "ready");
        });
        $("btnClear2").addEventListener("click", () => {
            $("otherEmp").value = "";
            $("otherAssetNo").value = "";
            clearResults();
            setStatus($("statusBox2"), "พร้อมค้นหา", "");
            setPill("Ready", "ready");
        });

        // Enter to search (Other mode)
        ["otherEmp", "otherAssetNo"].forEach(id => {
            $(id).addEventListener("keydown", (e) => {
                if (e.key === "Enter") runSearch("other");
            });
        });

        /** ==========================
         *  Querystring support (สำหรับเปิดจาก LINE OA)
         *  ตัวอย่าง:
         *  - ?mode=my
         *  - ?mode=other&emp=104127
         *  - ?mode=other&asset=201000019802
         *  ========================== */
        (function initFromQuery() {
            const q = new URLSearchParams(location.search);
            const mode = (q.get("mode") || "").toLowerCase();
            const emp = q.get("emp") || "";
            const asset = q.get("asset") || "";

            if (mode === "other") {
                $("tabOther").click();
                if (emp) $("otherEmp").value = emp;
                if (asset) $("otherAssetNo").value = asset;
                if (emp || asset) runSearch("other");
            } else if (mode === "my") {
                $("tabMy").click();
                runSearch("my");
            }
        })();
    </script>
</body>

</html>
