<!-- ❗ ตัดเฉพาะ buildCard() มาให้ (ส่วนอื่นของคุณใช้ได้แล้ว) -->

<script>
function buildCard(item) {

    // ✅ ใช้ Base64 ตรง ๆ
    const photo = item.PhotoBase64 || item.PhotoUrl || "";

    const asstNo = item.Asst_No || item.AsstNo || item.Asset_No || item.AssetNo || "";
    const assetType = item.Asset_Type || item.AssetType || "-";
    const manu = item.Manufacturer || "-";
    const model = item.Model || "-";
    const plant = item.Plant || "-";
    const dept = item.Department || "-";
    const area = item.Area || "-";
    const empCode = item.Emp_Code || item.EmpCode || "-";
    const empName = item.Emp_Name || item.EmpName || "-";

    const safeAsst = escapeHtml(asstNo);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <div class="img">
            ${photo
                ? `<img src="${photo}" />`
                : `<div style="color:#6c757d;font-size:13px">ไม่มีรูป</div>`}
            <div class="tag">${escapeHtml(plant)} • ${escapeHtml(area)}</div>
        </div>

        <div class="body">
            <div class="head">
                <div class="left">
                    <div class="assetno">${safeAsst || "-"}</div>
                    <div class="atype">${escapeHtml(assetType)}</div>
                </div>
                <div class="chip">${escapeHtml(manu)}</div>
            </div>

            <div class="grid">
                <div class="kv">
                    <div class="k">Model</div>
                    <div class="v">${escapeHtml(model)}</div>
                </div>
                <div class="kv">
                    <div class="k">Department</div>
                    <div class="v">${escapeHtml(dept)}</div>
                </div>
                <div class="kv">
                    <div class="k">Emp_Code</div>
                    <div class="v mono">${escapeHtml(empCode)}</div>
                </div>
                <div class="kv">
                    <div class="k">Emp_Name</div>
                    <div class="v">${escapeHtml(empName)}</div>
                </div>
            </div>
        </div>

        <div class="foot">
            <button class="link openImg" type="button">🖼️ เปิดรูป</button>
            <button class="copy" type="button">📋 Copy Asset_No</button>
        </div>
    `;

    // ✅ ✅ ✅ เปิดรูป (Fix LINE WebView)
    card.querySelector(".openImg").addEventListener("click", () => {
        if (!photo) return;

        const w = window.open();
        w.document.write(`
            <html>
            <head>
                <title>Asset Image</title>
                <meta name="viewport" content="width=device-width, initial-scale=1">
            </head>
            <body style="margin:0;background:black;display:flex;justify-content:center;align-items:center;">
                <img src="${photo}" style="width:100%;height:auto;" />
            </body>
            </html>
        `);
    });

    // ✅ copy
    card.querySelector(".copy").addEventListener("click", async () => {
        try {
            await navigator.clipboard.writeText(asstNo);
            setPill("Copied ✓");
            setTimeout(() => setPill("Ready"), 1200);
        } catch {
            alert("Copy ไม่สำเร็จ");
        }
    });

    return card;
}
</script>
